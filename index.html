<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquity CR Signal Backtest | HerdVibe</title>
<meta name="description" content="Liquity Collateral Ratio를 활용한 ETH 가격 탑/바텀 시그널 백테스트 대시보드">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --card: #111111;
  --card-border: #1a1a1a;
  --text: #e0e0e8;
  --text-dim: #6b6b80;
  --accent: #00d4aa;
  --red: #ff4466;
  --yellow: #ffc107;
  --orange: #ff8c00;
  --purple: #8b5cf6;
  --eth: #627eea;
  --font: 'Noto Sans KR', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font); }
.container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

/* Header */
.header { margin-bottom: 24px; }
.header-badge { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 4px; }
.badge-purple { background: var(--purple); color: #fff; }
.badge-dim { color: var(--text-dim); font-size: 11px; }
.header h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.3; }
.header p { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

/* Stats Grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-box { background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; padding: 14px 16px; }
.stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 700; font-family: var(--mono); }
.stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.stat-green { color: var(--accent); }
.stat-red { color: var(--red); }
.stat-yellow { color: var(--yellow); }

/* Chart Cards */
.chart-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px 16px; margin-bottom: 16px; }
.chart-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.chart-subtitle { font-size: 11px; color: var(--text-dim); margin-bottom: 14px; }
.chart-wrap { position: relative; height: 400px; }
.chart-wrap-sm { height: 260px; }

/* Tables Grid */
.tables-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
@media (max-width: 768px) { .tables-grid { grid-template-columns: 1fr; } }
.table-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; }
.table-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
.table-header, .table-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 4px; padding: 4px 0; font-size: 12px; }
.table-header { color: var(--text-dim); font-size: 11px; border-bottom: 1px solid var(--card-border); margin-bottom: 4px; padding-bottom: 8px; }
.table-row { border-bottom: 1px solid rgba(255,255,255,0.03); }
.table-scroll { max-height: 260px; overflow-y: auto; }

/* Insight Box */
.insight-box { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.insight-box h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
.insight-box p { font-size: 13px; color: var(--text-dim); line-height: 1.8; margin-bottom: 6px; }
.insight-box strong { color: var(--text); }

/* Share Bar */
.share-bar { display: flex; justify-content: center; gap: 12px; padding: 16px 0; margin-bottom: 12px; }
.share-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--card-border); background: var(--card); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.2s; font-size: 16px; }
.share-btn:hover { border-color: var(--accent); }

/* Footer */
.footer { text-align: center; font-size: 11px; color: var(--text-dim); padding: 12px 0 24px; }

/* Loading */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
.loading-title { font-size: 24px; font-weight: 700; margin-bottom: 16px; font-family: var(--mono); letter-spacing: 2px; }
.loading-bar { width: 200px; height: 3px; background: var(--card-border); border-radius: 2px; overflow: hidden; }
.loading-bar-inner { width: 40%; height: 100%; background: var(--accent); border-radius: 2px; animation: loadPulse 1.5s ease infinite; }
.loading-step { margin-top: 12px; font-size: 12px; color: var(--text-dim); }
@keyframes loadPulse { 0%,100% { width: 20%; opacity: 0.4; } 50% { width: 80%; opacity: 1; } }

/* Updated Badge */
.updated-badge { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading">
    <div class="loading-title">LIQUITY CR SIGNAL</div>
    <div class="loading-bar"><div class="loading-bar-inner"></div></div>
    <div class="loading-step" id="loading-step">데이터 로드 중...</div>
  </div>
</div>

<script>
const COLORS = {
  eth: '#627eea', cr: '#00d4aa', dist: '#ffc107',
  red: '#ff4466', green: '#00d4aa', yellow: '#ffc107',
  purple: '#8b5cf6', textDim: '#6b6b80', card: '#111111',
  cardBorder: '#1a1a1a', recoveryBg: 'rgba(255,68,102,0.06)',
};

// Watermark plugin
const watermarkPlugin = {
  id: 'watermark',
  afterDraw(chart) {
    const ctx = chart.ctx;
    ctx.save();
    ctx.font = '11px JetBrains Mono';
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.textAlign = 'right';
    ctx.fillText('Herdvibe.com', chart.width - 12, chart.height - 8);
    ctx.restore();
  }
};
Chart.register(watermarkPlugin);

async function init() {
  try {
    document.getElementById('loading-step').textContent = 'data.json 로드 중...';
    const res = await fetch('data.json');
    if (!res.ok) throw new Error(`data.json fetch failed: ${res.status}`);
    const data = await res.json();
    render(data);
  } catch (err) {
    document.getElementById('loading-step').textContent = `오류: ${err.message}`;
    document.getElementById('loading-step').style.color = '#ff4466';
  }
}

function render(data) {
  const { stats, chart: chartData, tops, bottoms, recoveryEntries, updated, config } = data;
  const app = document.getElementById('app');

  // Build recovery zones
  const recoveryZones = [];
  let zoneStart = null;
  for (const d of chartData) {
    if (d.cr < 150 && !zoneStart) zoneStart = d.date;
    if (d.cr >= 150 && zoneStart) { recoveryZones.push({ start: zoneStart, end: d.date }); zoneStart = null; }
  }
  if (zoneStart) recoveryZones.push({ start: zoneStart, end: chartData[chartData.length - 1].date });

  const topSet = new Set(tops.map(t => t.date));
  const bottomSet = new Set(bottoms.map(b => b.date));

  app.innerHTML = `
    <!-- Header -->
    <div class="header">
      <div class="header-badge">
        <span class="badge badge-purple">BACKTEST</span>
        <span class="badge-dim">DeFiLlama Data</span>
        <span class="updated-badge">Updated: ${updated}</span>
      </div>
      <h1>Liquity CR → ETH 탑/바텀 시그널 분석</h1>
      <p>CR(Collateral Ratio)이 ETH 가격의 로컬 고점/저점과 어떤 상관관계를 보이는지 백테스트 (±${config.windowDays}일 윈도우)</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">데이터 범위</div>
        <div class="stat-value" style="font-size:14px">${stats.dateRange}</div>
        <div class="stat-sub">${stats.dataPoints}일</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">탑 평균 CR</div>
        <div class="stat-value stat-red">${stats.avgTopCR}%</div>
        <div class="stat-sub">${stats.topCount}개 탑 감지 · 거리 +${stats.avgTopDistance}%p</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">바텀 평균 CR</div>
        <div class="stat-value stat-green">${stats.avgBottomCR}%</div>
        <div class="stat-sub">${stats.bottomCount}개 바텀 감지 · 거리 ${stats.avgBottomDistance}%p</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Recovery Mode 진입</div>
        <div class="stat-value stat-yellow">${stats.recoveryCount}회</div>
        <div class="stat-sub">CR &lt; 150%</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">CR 범위</div>
        <div class="stat-value">${stats.minCR}% ~ ${stats.maxCR}%</div>
      </div>
    </div>

    <!-- Chart 1 -->
    <div class="chart-card">
      <div class="chart-title">ETH 가격 + Collateral Ratio</div>
      <div class="chart-subtitle">🔴 탑 · 🟢 바텀 · 음영 = Recovery Mode (CR&lt;150%) · 노란점선 = 150% 임계선</div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>

    <!-- Chart 2 -->
    <div class="chart-card">
      <div class="chart-title">CR Distance Oscillator (CR − 150%)</div>
      <div class="chart-subtitle">0 이하 = Recovery Mode 구간 · 🔴 탑 시점 · 🟢 바텀 시점</div>
      <div class="chart-wrap chart-wrap-sm"><canvas id="distChart"></canvas></div>
    </div>

    <!-- Tables -->
    <div class="tables-grid">
      <div class="table-card">
        <div class="table-title" style="color:${COLORS.red}">🔴 ETH 로컬 탑</div>
        <div class="table-header"><span>날짜</span><span>ETH 가격</span><span>CR</span></div>
        <div class="table-scroll" id="topTable"></div>
      </div>
      <div class="table-card">
        <div class="table-title" style="color:${COLORS.green}">🟢 ETH 로컬 바텀</div>
        <div class="table-header"><span>날짜</span><span>ETH 가격</span><span>CR</span></div>
        <div class="table-scroll" id="bottomTable"></div>
      </div>
    </div>

    <!-- Insight -->
    <div class="insight-box">
      <h3>📊 분석 요약</h3>
      <p><span style="color:${COLORS.red}">탑</span>에서의 평균 CR: <strong>${stats.avgTopCR}%</strong> (150%로부터 <strong>+${stats.avgTopDistance}%p</strong>)</p>
      <p><span style="color:${COLORS.green}">바텀</span>에서의 평균 CR: <strong>${stats.avgBottomCR}%</strong> (150%로부터 <strong>${stats.avgBottomDistance}%p</strong>)</p>
      <p>Recovery Mode 진입 횟수: <strong style="color:${COLORS.yellow}">${stats.recoveryCount}회</strong></p>
      <p style="font-size:12px;margin-top:8px">※ Liquity V1 시스템 전체 CR 기준. Recovery Mode = TCR&lt;150%. 탑/바텀은 ±${config.windowDays}일 윈도우 로컬 극점. 최소 간격 ${config.minGapDays}일.</p>
    </div>

    <!-- Share Bar -->
    <div class="share-bar">
      <button class="share-btn" onclick="shareX()" title="X (Twitter)">𝕏</button>
      <button class="share-btn" onclick="shareKakao()" title="KakaoTalk">💬</button>
      <button class="share-btn" onclick="shareTelegram()" title="Telegram">✈️</button>
      <button class="share-btn" onclick="copyLink()" title="링크 복사">🔗</button>
    </div>

    <!-- Footer -->
    <div class="footer">
      Data: DeFiLlama (api.llama.fi) · Updated daily via GitHub Actions<br>
      Herdvibe.com — Liquity CR Signal Backtest
    </div>
  `;

  // Fill tables
  const topTable = document.getElementById('topTable');
  tops.forEach(t => {
    const crColor = t.cr > 200 ? COLORS.green : t.cr < 150 ? COLORS.red : COLORS.yellow;
    topTable.innerHTML += `<div class="table-row"><span style="color:${COLORS.textDim}">${t.date}</span><span>$${t.ethPrice.toFixed(0)}</span><span style="color:${crColor}">${t.cr.toFixed(1)}%</span></div>`;
  });
  const bottomTable = document.getElementById('bottomTable');
  bottoms.forEach(b => {
    const crColor = b.cr > 200 ? COLORS.green : b.cr < 150 ? COLORS.red : COLORS.yellow;
    bottomTable.innerHTML += `<div class="table-row"><span style="color:${COLORS.textDim}">${b.date}</span><span>$${b.ethPrice.toFixed(0)}</span><span style="color:${crColor}">${b.cr.toFixed(1)}%</span></div>`;
  });

  // ─── Chart 1: ETH + CR ───
  const labels = chartData.map(d => d.date);
  const ethPrices = chartData.map(d => d.ethPrice);
  const crValues = chartData.map(d => d.cr);

  // Top/Bottom point datasets
  const topPoints = chartData.map(d => topSet.has(d.date) ? d.ethPrice : null);
  const bottomPoints = chartData.map(d => bottomSet.has(d.date) ? d.ethPrice : null);

  // Recovery zone annotations
  const boxAnnotations = {};
  recoveryZones.forEach((z, i) => {
    boxAnnotations[`recovery${i}`] = {
      type: 'box', xMin: z.start, xMax: z.end,
      backgroundColor: COLORS.recoveryBg, borderWidth: 0,
    };
  });
  boxAnnotations['line150'] = {
    type: 'line', yMin: 150, yMax: 150, yScaleID: 'yCR',
    borderColor: COLORS.yellow + '66', borderWidth: 1, borderDash: [8, 4],
    label: { display: true, content: '150%', position: 'start', font: { size: 10, family: 'JetBrains Mono' }, color: COLORS.yellow + '88' }
  };

  new Chart(document.getElementById('mainChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'ETH Price',
          data: ethPrices,
          borderColor: COLORS.eth,
          borderWidth: 2,
          pointRadius: 0,
          yAxisID: 'yETH',
          tension: 0.1,
          order: 2,
        },
        {
          label: 'CR',
          data: crValues,
          borderColor: COLORS.cr + '88',
          borderWidth: 1.5,
          borderDash: [4, 2],
          pointRadius: 0,
          yAxisID: 'yCR',
          tension: 0.1,
          order: 3,
        },
        {
          label: '탑',
          data: topPoints,
          borderColor: 'transparent',
          pointBackgroundColor: COLORS.red,
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          pointRadius: topPoints.map(v => v ? 7 : 0),
          yAxisID: 'yETH',
          showLine: false,
          order: 1,
        },
        {
          label: '바텀',
          data: bottomPoints,
          borderColor: 'transparent',
          pointBackgroundColor: COLORS.green,
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          pointRadius: bottomPoints.map(v => v ? 7 : 0),
          yAxisID: 'yETH',
          showLine: false,
          order: 1,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, labels: { color: COLORS.textDim, font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } },
        annotation: { annotations: boxAnnotations },
        tooltip: {
          backgroundColor: '#1a1a2e',
          titleColor: COLORS.textDim,
          bodyColor: '#e0e0e8',
          borderColor: '#2a2a3e',
          borderWidth: 1,
          titleFont: { family: 'JetBrains Mono', size: 11 },
          bodyFont: { family: 'JetBrains Mono', size: 12 },
          callbacks: {
            label(ctx) {
              if (ctx.dataset.label === 'ETH Price') return `ETH: $${ctx.parsed.y.toFixed(0)}`;
              if (ctx.dataset.label === 'CR') return `CR: ${ctx.parsed.y.toFixed(1)}%`;
              if (ctx.dataset.label === '탑') return ctx.parsed.y ? `🔴 탑: $${ctx.parsed.y.toFixed(0)}` : '';
              if (ctx.dataset.label === '바텀') return ctx.parsed.y ? `🟢 바텀: $${ctx.parsed.y.toFixed(0)}` : '';
              return '';
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: COLORS.textDim, font: { size: 10, family: 'JetBrains Mono' }, maxTicksLimit: 12 },
          grid: { color: 'rgba(255,255,255,0.03)' },
        },
        yETH: {
          position: 'left',
          ticks: { color: COLORS.eth, font: { size: 10, family: 'JetBrains Mono' }, callback: v => `$${v}` },
          grid: { color: 'rgba(255,255,255,0.03)' },
        },
        yCR: {
          position: 'right',
          min: 100,
          ticks: { color: COLORS.cr, font: { size: 10, family: 'JetBrains Mono' }, callback: v => `${v}%` },
          grid: { display: false },
        },
      }
    }
  });

  // ─── Chart 2: Distance Oscillator ───
  const distValues = chartData.map(d => d.crDistance);
  const distTopPoints = chartData.map(d => topSet.has(d.date) ? d.crDistance : null);
  const distBottomPoints = chartData.map(d => bottomSet.has(d.date) ? d.crDistance : null);

  new Chart(document.getElementById('distChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'CR Distance',
          data: distValues,
          borderColor: COLORS.dist,
          backgroundColor: COLORS.dist + '12',
          borderWidth: 1.5,
          pointRadius: 0,
          fill: true,
          tension: 0.1,
          order: 2,
        },
        {
          label: '탑',
          data: distTopPoints,
          borderColor: 'transparent',
          pointBackgroundColor: COLORS.red,
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          pointRadius: distTopPoints.map(v => v != null ? 6 : 0),
          showLine: false,
          order: 1,
        },
        {
          label: '바텀',
          data: distBottomPoints,
          borderColor: 'transparent',
          pointBackgroundColor: COLORS.green,
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          pointRadius: distBottomPoints.map(v => v != null ? 6 : 0),
          showLine: false,
          order: 1,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, labels: { color: COLORS.textDim, font: { size: 11 }, usePointStyle: true } },
        annotation: {
          annotations: {
            zero: { type: 'line', yMin: 0, yMax: 0, borderColor: COLORS.red + '88', borderWidth: 1.5, borderDash: [6, 3] }
          }
        },
        tooltip: {
          backgroundColor: '#1a1a2e', borderColor: '#2a2a3e', borderWidth: 1,
          titleFont: { family: 'JetBrains Mono', size: 11 },
          bodyFont: { family: 'JetBrains Mono', size: 12 },
          callbacks: {
            label(ctx) {
              const v = ctx.parsed.y;
              if (ctx.dataset.label === 'CR Distance') return `거리: ${v > 0 ? '+' : ''}${v.toFixed(1)}%p`;
              return v != null ? `${ctx.dataset.label}: ${v > 0 ? '+' : ''}${v.toFixed(1)}%p` : '';
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: COLORS.textDim, font: { size: 10, family: 'JetBrains Mono' }, maxTicksLimit: 12 },
          grid: { color: 'rgba(255,255,255,0.03)' },
        },
        y: {
          ticks: { color: COLORS.dist, font: { size: 10, family: 'JetBrains Mono' }, callback: v => `${v}%p` },
          grid: { color: 'rgba(255,255,255,0.03)' },
        },
      }
    }
  });
}

// ─── Share Functions ───
const PAGE_URL = encodeURIComponent(window.location.href);
const PAGE_TITLE = encodeURIComponent('Liquity CR Signal Backtest — ETH 탑/바텀 시그널 분석 | HerdVibe');

function shareX() {
  window.open(`https://twitter.com/intent/tweet?text=${PAGE_TITLE}&url=${PAGE_URL}`, '_blank');
}
function shareTelegram() {
  window.open(`https://t.me/share/url?url=${PAGE_URL}&text=${PAGE_TITLE}`, '_blank');
}
function shareKakao() {
  if (window.Kakao && !Kakao.isInitialized()) Kakao.init('a43ed7b39fac35458f4f9df925a279b5');
  if (window.Kakao) {
    Kakao.Share.sendDefault({
      objectType: 'feed',
      content: {
        title: 'Liquity CR Signal Backtest',
        description: 'Collateral Ratio로 ETH 탑/바텀 시그널을 백테스트합니다',
        imageUrl: '',
        link: { mobileWebUrl: window.location.href, webUrl: window.location.href },
      },
    });
  }
}
function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => alert('링크 복사됨!'));
}

init();
</script>
</body>
</html>
